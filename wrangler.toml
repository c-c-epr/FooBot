"$schema" = "./node_modules/wrangler/config-schema.json"
name = "foobot"
main = "src/index.ts"
compatibility_date = "2026-01-28"
secrets_store_secrets = [
    { binding = "Foo_Channel_Secret", store_id= "9c70a29302f948cb9ff3ddbd8d2afb49", secret_name = "LINE_CHANNEL_SECRET" },
    { binding = "Foo_Channel_Access_Token", store_id= "9c70a29302f948cb9ff3ddbd8d2afb49", secret_name = "LINE_CHANNEL_ACCESS_TOKEN" }
]

[placement]
mode = "smart"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1